<!DOCTYPE html>
<html lang="zh-CN">
<head>

.mainPage{display:none;padding:30px;max-width:800px;margin:0 auto}
.title{font-size:32px;margin:20px 0;color:#fff}

<body>

<div class="videoPage" id="videoPage">

</html>
