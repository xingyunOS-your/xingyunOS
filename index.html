<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xingyunOS官方网站</title>
<style>
body{background:#121212;color:#fff;font-family:Arial;text-align:center;margin:0;padding:15px}
video{width:100%;max-width:500px;border-radius:10px;margin:10px auto}
.title{font-size:28px;margin:10px 0}
.welcome{font-size:16px;margin:10px;line-height:1.6}
button{padding:12px 25px;margin:8px;border:none;border-radius:10px;background:#007bff;color:#fff;font-size:15px}
.gamebtn{background:#333;margin-top:5px}
#game{margin:20px auto}
canvas{background:#000;border:2px solid #fff}
</style>
</head>
<body>

<video src="01.mp4" controls autoplay></video>

<div class="title">xingyunOS官方网站</div>
<div class="welcome">欢迎使用xingyunOS(✪▽✪)
<br>系统稳定流畅，安全好用，持续更新，感谢一路陪伴！</div>

<button onclick="tianyi()">天翼云盘</button>
<button onclick="pan123()">123网盘</button>

<div id="game">
<button class="gamebtn" onclick="startSnake()">贪吃蛇</button>
<button class="gamebtn" onclick="startMine()">扫雷</button>
<canvas id="can" width="300" height="300"></canvas>
</div>

<script>
//天翼云盘
function tianyi(){
navigator.clipboard.writeText('wsn7');
alert('访问码已复制');
window.open('https://cloud.189.cn/t/be267fBzaYFr','_blank');
}

//123网盘
function pan123(){
navigator.clipboard.writeText('xVSp');
alert('访问码已复制');
window.open('https://www.123865.com/s/BotTvd-h6T1?pwd=xVSp#','_blank');
}

//贪吃蛇
function startSnake(){
let c=document.getElementById("can");
let ctx=c.getContext("2d");
let snake=[[10,10]],dir=1,food=[15,15],size=20;
function draw(){
ctx.fillStyle="#000";ctx.fillRect(0,0,300,300);
ctx.fillStyle="#0f0";snake.forEach(([x,y])=>ctx.fillRect(x*size,y*size,size-2,size-2));
ctx.fillStyle="#f00";ctx.fillRect(food[0]*size,food[1]*size,size-2,size-2);
}
function move(){
let h=snake[0];let nx=h[0],ny=h[1];
dir==1&&nx++;dir==2&&nx--;dir==3&&ny++;dir==4&&ny--;
snake.unshift([nx,ny]);
if(nx==food[0]&&ny==food[1]){
food=[Math.floor(Math.random()*15),Math.floor(Math.random()*15)];
}else{snake.pop();}
draw();
}
setInterval(move,120);
document.onkeydown=(e)=>{
if(e.key=="ArrowRight"&&dir!=2)dir=1;
if(e.key=="ArrowLeft"&&dir!=1)dir=2;
if(e.key=="ArrowDown"&&dir!=4)dir=3;
if(e.key=="ArrowUp"&&dir!=3)dir=4;
}
draw();
}

//扫雷
function startMine(){
let c=document.getElementById("can");
let ctx=c.getContext("2d");
let map=[],w=10;
for(let i=0;i<w;i++){map[i]=[];for(let j=0;j<w;j++)map[i][j]=Math.random()>0.8?9:0;}
function drawM(){
ctx.fillStyle="#000";ctx.fillRect(0,0,300,300);
for(let i=0;i<w;i++){
for(let j=0;j<w;j++){
ctx.strokeStyle="#fff";ctx.strokeRect(i*30,j*30,30,30);
if(map[i][j]==9){ctx.fillStyle="#f00";ctx.fillText("💣",i*30+5,j*30+20);}
}}}
drawM();
}
</script>
</body>
</html>
